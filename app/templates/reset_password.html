{% extends "base.html" %}

{% block title %}Reset Password - SubWrite{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">🔑</span>
            </div>
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Reset Password</h2>
            <p class="text-gray-600">Enter your new password</p>
        </div>

        <form action="/reset-password" method="POST" class="space-y-4">
            <input type="hidden" name="token" value="{{ token }}">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                <input type="password"
                       name="password"
                       required
                       minlength="6"
                       placeholder="Enter new password"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                <input type="password"
                       name="confirm_password"
                       required
                       minlength="6"
                       placeholder="Confirm new password"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>

            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg text-sm">
                {{ error }}
            </div>
            {% endif %}

            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 font-semibold">
                Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
