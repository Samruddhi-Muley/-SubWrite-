{% extends "base.html" %}

{% block title %}Verification Failed - SubWrite{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-12 text-center">
        <div class="mb-6">
            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-4xl">❌</span>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-gray-900 mb-4">Verification Failed</h1>

        <p class="text-lg text-gray-600 mb-8">{{ message }}</p>

        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-8">
            <p class="text-sm text-yellow-800">
                <strong>Need a new verification link?</strong><br>
                Contact support or register again.
            </p>
        </div>

        <div class="flex justify-center space-x-4">
            <a href="/register" class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 font-semibold">
                Register Again
            </a>
            <a href="/" class="bg-gray-200 text-gray-700 px-8 py-3 rounded-lg hover:bg-gray-300 font-semibold">
                Go to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
