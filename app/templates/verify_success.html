{% extends "base.html" %}

{% block title %}Email Verified - SubWrite{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-12 text-center">
        <div class="mb-6">
            {% if already_verified %}
                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-4xl">ℹ️</span>
                </div>
            {% else %}
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-4xl">✅</span>
                </div>
            {% endif %}
        </div>

        <h1 class="text-3xl font-bold text-gray-900 mb-4">
            {% if already_verified %}
                Already Verified
            {% else %}
                Email Verified!
            {% endif %}
        </h1>

        <p class="text-lg text-gray-600 mb-8">{{ message }}</p>

        <div class="flex justify-center space-x-4">
            <a href="/login" class="bg-indigo-600 text-white px-8 py-3 rounded-lg hover:bg-indigo-700 font-semibold">
                Login Now
            </a>
            <a href="/" class="bg-gray-200 text-gray-700 px-8 py-3 rounded-lg hover:bg-gray-300 font-semibold">
                Go to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
