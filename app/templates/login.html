{% extends "base.html" %}

{% block title %}Login - SubWrite{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">Login to SubWrite</h2>

        <!-- Changed action to /login -->
        <form action="/login" method="POST" class="space-y-4">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                <input type="text"
                       name="username"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password"
                       name="password"
                       required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>

            <div class="text-right">
                      <a href="/forgot-password" class="text-sm text-indigo-600 hover:text-indigo-800">
                          Forgot password?
                      </a>
            </div>

            {% if error %}
            <div class="text-sm text-red-500">{{ error }}</div>
            {% endif %}

            <button type="submit"
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 font-semibold">
                Login
            </button>
        </form>

        <p class="mt-4 text-center text-gray-600">
            Don't have an account?
            <a href="/register" class="text-indigo-600 hover:text-indigo-800 font-semibold">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
